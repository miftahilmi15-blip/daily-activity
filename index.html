<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Hub - Miftah Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            /* Perpaduan Hijau, Biru, Putih */
            background: linear-gradient(135deg, #00880d 0%, #005f6b 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 50;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.active { display: flex; }
    </style>
</head>
<body class="max-w-md mx-auto pb-24">

    <div class="p-6 text-white">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-xl font-bold">Halo, Miftah!</h1>
                <p class="text-xs opacity-80">Semangat produktif hari ini.</p>
            </div>
            <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center border border-white/30">
                <i class="fa-solid fa-user"></i>
            </div>
        </div>

        <div class="bg-white rounded-2xl p-4 text-slate-800 shadow-xl flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-sky-500 text-white p-2 rounded-xl">
                    <i class="fa-solid fa-wallet"></i>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-sky-600 uppercase">Gojek Style Pay</p>
                    <p class="text-lg font-black leading-none">Rp 0</p>
                </div>
            </div>
            <div class="flex gap-4 border-l pl-4 border-gray-100">
                <button class="flex flex-col items-center gap-1">
                    <i class="fa-solid fa-circle-plus text-sky-500"></i>
                    <span class="text-[10px] font-bold">Top Up</span>
                </button>
                <button class="flex flex-col items-center gap-1">
                    <i class="fa-solid fa-paper-plane text-sky-500"></i>
                    <span class="text-[10px] font-bold">Kirim</span>
                </button>
            </div>
        </div>
    </div>

    <div class="glass-card mt-2 rounded-t-[32px] min-h-[60vh] p-6 shadow-2xl">
        <div class="grid grid-cols-4 gap-y-8 gap-x-2">
            
            <button onclick="openModal('Shopee Affiliate')" class="flex flex-col items-center group">
                <div class="w-14 h-14 bg-orange-100 rounded-2xl flex items-center justify-center mb-1 shadow-sm transition-transform active:scale-90">
                    <i class="fa-solid fa-video text-orange-600 text-xl"></i>
                </div>
                <span class="text-[11px] text-gray-600 font-semibold">Affiliate</span>
            </button>

            <button onclick="openModal('Membaca Buku')" class="flex flex-col items-center">
                <div class="w-14 h-14 bg-blue-100 rounded-2xl flex items-center justify-center mb-1 shadow-sm active:scale-90">
                    <i class="fa-solid fa-book-open text-blue-600 text-xl"></i>
                </div>
                <span class="text-[11px] text-gray-600 font-semibold">Baca</span>
            </button>

            <button onclick="openModal('Coding Project')" class="flex flex-col items-center">
                <div class="w-14 h-14 bg-slate-100 rounded-2xl flex items-center justify-center mb-1 shadow-sm active:scale-90">
                    <i class="fa-solid fa-code text-slate-700 text-xl"></i>
                </div>
                <span class="text-[11px] text-gray-600 font-semibold">Coding</span>
            </button>

            <button onclick="openModal('Smart Fisheries')" class="flex flex-col items-center">
                <div class="w-14 h-14 bg-cyan-100 rounded-2xl flex items-center justify-center mb-1 shadow-sm active:scale-90">
                    <i class="fa-solid fa-fish text-cyan-600 text-xl"></i>
                </div>
                <span class="text-[11px] text-gray-600 font-semibold">Fishery</span>
            </button>

            <button onclick="openModal('Katalog Digital')" class="flex flex-col items-center">
                <div class="w-14 h-14 bg-pink-100 rounded-2xl flex items-center justify-center mb-1 shadow-sm active:scale-90">
                    <i class="fa-solid fa-list-check text-pink-600 text-xl"></i>
                </div>
                <span class="text-[11px] text-gray-600 font-semibold">Katalog</span>
            </button>

            <button onclick="openModal('Stek Pohon Tin')" class="flex flex-col items-center">
                <div class="w-14 h-14 bg-green-100 rounded-2xl flex items-center justify-center mb-1 shadow-sm active:scale-90">
                    <i class="fa-solid fa-leaf text-green-600 text-xl"></i>
                </div>
                <span class="text-[11px] text-gray-600 font-semibold">Tanaman</span>
            </button>

            <button onclick="openModal('Ternak Kambing')" class="flex flex-col items-center">
                <div class="w-14 h-14 bg-amber-100 rounded-2xl flex items-center justify-center mb-1 shadow-sm active:scale-90">
                    <i class="fa-solid fa-cow text-amber-600 text-xl"></i>
                </div>
                <span class="text-[11px] text-gray-600 font-semibold">Kambing</span>
            </button>

            <button onclick="openModal('Side Business')" class="flex flex-col items-center">
                <div class="w-14 h-14 bg-purple-100 rounded-2xl flex items-center justify-center mb-1 shadow-sm active:scale-90">
                    <i class="fa-solid fa-microchip text-purple-600 text-xl"></i>
                </div>
                <span class="text-[11px] text-gray-600 font-semibold">Mining</span>
            </button>

            <button onclick="openModal('UKM Keperawatan')" class="flex flex-col items-center">
                <div class="w-14 h-14 bg-red-100 rounded-2xl flex items-center justify-center mb-1 shadow-sm active:scale-90">
                    <i class="fa-solid fa-hospital-user text-red-600 text-xl"></i>
                </div>
                <span class="text-[11px] text-gray-600 font-semibold">UKM</span>
            </button>

        </div>

        <div class="mt-10 bg-gradient-to-br from-sky-50 to-white border border-sky-100 p-4 rounded-2xl flex items-center gap-4">
            <div class="text-sky-600 text-3xl"><i class="fa-solid fa-star"></i></div>
            <div>
                <p class="font-bold text-slate-800">Miftah Premium</p>
                <p class="text-xs text-slate-500 leading-tight">Buka akses integrasi API Smart Fisheries otomatis.</p>
            </div>
        </div>
    </div>

    <div id="featureModal" class="modal">
        <div class="bg-white w-full max-w-sm rounded-3xl overflow-hidden shadow-2xl">
            <div class="p-6 border-b flex justify-between items-center">
                <h2 id="modalTitle" class="font-bold text-lg text-slate-800">Fitur</h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-red-500 transition"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="p-10 text-center">
                <div class="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-4 border-2 border-dashed border-gray-200">
                    <i class="fa-solid fa-hourglass-half text-gray-300 text-2xl animate-pulse"></i>
                </div>
                <p class="text-gray-400 text-sm">Halaman sedang dikembangkan...</p>
                <p class="text-[10px] text-gray-300 mt-2 italic">Coming soon: Integrasi Database Miftah</p>
            </div>
            <div class="p-4 bg-gray-50 flex gap-2">
                <button onclick="closeModal()" class="flex-1 py-3 bg-white border font-bold text-xs rounded-xl text-gray-600">TUTUP</button>
                <button onclick="alert('Fitur segera hadir!')" class="flex-1 py-3 bg-green-600 font-bold text-xs rounded-xl text-white">SIMPAN DATA</button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t flex justify-around items-center py-3 max-w-md mx-auto shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
        <div class="flex flex-col items-center text-green-700">
            <i class="fa-solid fa-house-chimney text-lg"></i>
            <span class="text-[10px] font-bold">Beranda</span>
        </div>
        <div class="flex flex-col items-center text-gray-400">
            <i class="fa-solid fa-chart-line text-lg"></i>
            <span class="text-[10px]">Statistik</span>
        </div>
        <div class="flex flex-col items-center text-gray-400">
            <i class="fa-solid fa-bell text-lg"></i>
            <span class="text-[10px]">Notifikasi</span>
        </div>
    </nav>

    <script>
        function openModal(title) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('featureModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('featureModal').classList.remove('active');
        }

        // Tutup modal kalau klik area luar modal
        window.onclick = function(event) {
            const modal = document.getElementById('featureModal');
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>

</body>
</html>
